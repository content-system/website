<select id="limit" name="limit" onchange="search(event)">
  {% for pageSize in limits %}
  <option value="{{pageSize}}" {% if pageSize==filter.limit %} selected {% endif %}>{{pageSize}}</option>
  {% endfor %}
</select>
<input type="text" id="q" name="q" maxlength="100" onchange="qOnChange(event)" value="{{filter.q}}"
  placeholder="{{resource.search}}" />
<button type="button" id="clearQBtn" name="clearQBtn" hidden class="btn-remove-text"
  onclick="clearText(event)"></button>
<button type="submit" id="searchBtn" name="searchBtn" class="btn-search" onclick="search(event)"></button>
